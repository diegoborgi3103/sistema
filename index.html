<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/png" href="assets/imagens/fundo-moto.png">

    <title>DOKA'S MOTORS | LOGIN</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg,
                    #0B1220 0%,
                    #111C33 50%,
                    #1A2745 100%);
        }

        .login {
            width: 420px;
            background: rgba(11, 18, 32, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px;
            color: white;

            box-shadow:
                0 0 40px rgba(240, 240, 240, 0.15),
                0 10px 40px rgba(0, 0, 0, 0.4);
        }


        .login h2 {
            text-align: center;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .subtitulo {
            text-align: center;
            color: #b8b8b8;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .campo {
            margin-bottom: 18px;
        }

        .campo label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .campo input {
            width: 100%;
            height: 48px;
            background: #162238;
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 0 15px;
            color: white;
            transition: .3s;
        }

        .campo input:focus {
            outline: none;
            border-color: #FF0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, .2);
        }

        .btn-login {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(180deg, #ff2a2a, #d10000);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: .3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 0, 0, .4);
        }

        .opcoes {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 13px;
        }

        .opcoes a {
            color: #FF4D4D;
            text-decoration: none;
        }

        .opcoes a:hover {
            text-decoration: underline;
        }

        
    </style>
</head>

<body>

    <div class="login">

        

        <h2>Seja Bem-vindo!</h2>
        <p class="subtitulo">Entre para acessar o sistema.</p>

        <form action="logado.html" method="post">

            <div class="campo">
                <label>Usuário</label>
                <input type="text" placeholder="Digite seu usuário">
            </div>

            <div class="campo">
                <label>Senha</label>
                <input type="password" placeholder="Digite sua senha">
            </div>

            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right"></i>
                Entrar
            </button>

        </form>

        
       

    </div>

</body>

</html>
